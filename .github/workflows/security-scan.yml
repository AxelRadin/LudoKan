name: Security Scan

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging]
  schedule:
    # Scan quotidien à 2h du matin
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  grype-scan:
    name: Grype Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker compose build web

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Run Grype vulnerability scanner
        run: |
          grype ludokan-web:latest -o sarif > grype-report.sarif
        continue-on-error: true

      - name: Upload Grype SARIF report
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: grype-report.sarif

      - name: Generate readable report and fail if needed
        run: |
          grype ludokan-web:latest

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Security vulnerabilities detected! Check the Security tab for details."
